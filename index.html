<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- A tag base é crucial para o GitHub Pages (subdiretórios) -->
    <base href="./" />
    <title>Meu Documento</title>
    
    <!-- Script para silenciar o aviso de produção do Tailwind -->
    <script>
      const originalWarn = console.warn;
      console.warn = (...args) => {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
        originalWarn.apply(console, args);
      };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: '#00428E',
                primary: '#057ED9',
                cyan: '#04CAEF',
                light: '#B6EDFF',
                orange: '#FEBE74',
                peach: '#FFDBBB',
                cream: '#FEE7C5',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #FEE7C5; }
    </style>
    
    <!-- Babel para compilar TSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Mapa de importação para resolver arquivos locais e dependências -->
    <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@0.292.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react": "https://esm.sh/react@18.2.0",
    "@google/genai": "https://esm.sh/@google/genai@0.1.0",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "pdf-lib": "https://esm.sh/pdf-lib@1.17.1",
    "pdfjs-dist": "https://esm.sh/pdfjs-dist@3.11.174",
    "./App": "./App.tsx",
    "./types": "./types.ts",
    "./constants": "./constants.ts",
    "./services/storage": "./services/storage.ts",
    "./services/geminiService": "./services/geminiService.ts",
    "./services/pdfService": "./services/pdfService.ts",
    "./components/Button": "./components/Button.tsx",
    "./components/Input": "./components/Input.tsx",
    "./components/CreateFolderModal": "./components/CreateFolderModal.tsx",
    "./components/EditFolderModal": "./components/EditFolderModal.tsx",
    "./components/DeleteFolderModal": "./components/DeleteFolderModal.tsx",
    "./components/UploadDocumentModal": "./components/UploadDocumentModal.tsx",
    "./components/ImagePreviewModal": "./components/ImagePreviewModal.tsx",
    "./components/EditDocumentModal": "./components/EditDocumentModal.tsx",
    "./components/ScanPdfModal": "./components/ScanPdfModal.tsx",
    "./components/MergePdfModal": "./components/MergePdfModal.tsx",
    "./components/PdfThumbnail": "./components/PdfThumbnail.tsx",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <!-- Ponto de entrada da aplicação com Babel (text/babel) -->
    <script type="text/babel" data-type="module" src="./index.tsx"></script>
  </body>
</html>
